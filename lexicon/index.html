<div id="temple-footer"></div>
<script src="../assets/config.js"></script>

<script>
(function () {
  'use strict';
  const C = window.KEK_CONFIG || {};
  const GROUPS = [
    ['temple', 'The Temple Tongue'],
    ['4chan', 'The Board Speech'],
    ['crypto', 'The Coin Cant'],
    ['genz', 'The Young Tongue'],
    ['meme', 'The Common Tongue']
  ];
  const CATNAME = Object.fromEntries(GROUPS);

  let ALL = [];
  let activeCat = 'all';
  let queryStr = '';

  const content = document.getElementById('lexicon-content');
  const chipsEl = document.getElementById('lexicon-chips');
  const searchEl = document.getElementById('lexicon-search');

  function esc(s) {
    return String(s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
  }

  function cardHTML(t) {
    const rel = (t.related || []).length
      ? '<div class="lexicon-see">see also: ' + t.related.map(r =>
          '<a href="#" data-term="' + esc(r) + '">' + esc(r) + '</a>'
        ).join(', ') + '</div>'
      : '';
    const org = t.origin
      ? '<div class="lexicon-origin"><b>origin</b> &nbsp;' + esc(t.origin) + '</div>'
      : '';
    const gmNote = t.id === 'gm'
      ? '<p class="lexicon-temple-note">In this Temple, <a href="/rituals/#morning-kek">Morning Kek</a> is the morning protocol — not GM.</p>'
      : '';
    return '<article class="lexicon-card" id="term-' + esc(t.id) + '">' +
      '<div class="lexicon-term">' + esc(t.term) + '</div>' +
      '<div class="lexicon-def">' + esc(t.definition) + '</div>' +
      gmNote + org + rel +
      '</article>';
  }

  function draw() {
    const q = queryStr.trim().toLowerCase();
    const rows = ALL.filter(t => {
      if (activeCat !== 'all' && (t.cat || 'meme') !== activeCat) return false;
      if (!q) return true;
      const hay = (t.term + ' ' + t.definition + ' ' + (t.aka || []).join(' ') + ' ' + (t.origin || '')).toLowerCase();
      return hay.includes(q);
    });
    if (!rows.length) {
      content.innerHTML = '<div class="lexicon-state">no words match that search.</div>';
      return;
    }
    let html = '';
    const order = GROUPS.map(g => g[0]);
    const cats = [...new Set(rows.map(r => r.cat || 'meme'))].sort((a, b) => order.indexOf(a) - order.indexOf(b));
    cats.forEach(cat => {
      const items = rows.filter(r => (r.cat || 'meme') === cat);
      if (!items.length) return;
      html += '<h2 class="lexicon-group-title">' + (CATNAME[cat] || cat) + '</h2>' +
        '<div class="lexicon-grid">' + items.map(cardHTML).join('') + '</div>';
    });
    content.innerHTML = html;
  }

  function buildChips() {
    const cats = ['all', ...GROUPS.map(g => g[0]).filter(c => ALL.some(t => (t.cat || 'meme') === c))];
    chipsEl.innerHTML = cats.map(c =>
      '<button type="button" class="lexicon-chip' + (c === 'all' ? ' active' : '') + '" data-cat="' + c + '">' +
      (c === 'all' ? 'all' : (CATNAME[c] || c)) + '</button>'
    ).join('');
  }

  document.addEventListener('click', e => {
    const chip = e.target.closest('.lexicon-chip');
    if (chip) {
      activeCat = chip.dataset.cat;
      document.querySelectorAll('.lexicon-chip').forEach(c => c.classList.toggle('active', c === chip));
      draw();
      return;
    }
    const rel = e.target.closest('[data-term]');
    if (rel) {
      e.preventDefault();
      const term = rel.dataset.term;
      activeCat = 'all';
      document.querySelectorAll('.lexicon-chip').forEach(c => c.classList.toggle('active', c.dataset.cat === 'all'));
      searchEl.value = term;
      queryStr = term;
      draw();
      const card = document.getElementById('term-' + term);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  });

  searchEl.addEventListener('input', () => { queryStr = searchEl.value; draw(); });

  async function load() {
    if (!C.SUPABASE_URL || !C.SUPABASE_ANON_KEY) {
      content.innerHTML = '<div class="lexicon-state">the vault did not answer.<br><br>config missing.</div>';
      return;
    }
    try {
      const url = C.SUPABASE_URL + '/rest/v1/lexicon?select=id,term,aka,cat,definition,origin,related&order=term.asc';
      const res = await fetch(url, {
        headers: {
          apikey: C.SUPABASE_ANON_KEY,
          Authorization: 'Bearer ' + C.SUPABASE_ANON_KEY
        }
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      ALL = await res.json();
      if (!ALL.length) {
        content.innerHTML = '<div class="lexicon-state">the lexicon is empty.</div>';
        return;
      }
      buildChips();
      draw();
    } catch (err) {
      content.innerHTML = '<div class="lexicon-state">the vault did not answer.<br><br>' +
        '<span style="font-size:.85rem;opacity:.7">(' + esc(String(err)) + ')</span></div>';
    }
  }

  load();
})();
</script>
