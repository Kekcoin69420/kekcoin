    </div>

    <footer class="lexicon-foot">
      <div class="lexicon-glyphs" aria-hidden="true">𓂀 &nbsp; 𓆏</div>
      speak, and be understood · also try <code>/define</code> in Telegram

</main>
<div id="temple-footer"></div>
<script src="../assets/config.js"></script>
<script src="../assets/temple.js"></script>
<script src="../assets/features.js"></script>
<script>
(function () {
  'use strict';
  const C = window.KEK_CONFIG || {};
  const GROUPS = [
    ['temple', 'The Temple Tongue', 'Temple'],
    ['4chan', 'The Board Speech', 'Board'],
    ['crypto', 'The Coin Cant', 'Coin Cant'],
    ['genz', 'The Young Tongue', 'Gen Z'],
    ['meme', 'The Common Tongue', 'Common']
  ];
  const CATNAME = Object.fromEntries(GROUPS.map(g => [g[0], g[1]]));
  const CHIPNAME = Object.fromEntries(GROUPS.map(g => [g[0], g[2]]));
  const CATGLYPH = { temple: '𓂀', '4chan': '𓏏', crypto: '◎', genz: '✦', meme: '𓆏' };

  let ALL = [];
  let idMap = {};
  let memeIds = new Set();
  let codexIds = new Set();
  let activeCat = 'all';
  let queryStr = '';
  let pendingHash = '';

  const content = document.getElementById('lexicon-content');
  const chipsEl = document.getElementById('lexicon-chips');
  const searchEl = document.getElementById('lexicon-search');

  function esc(s) {
    return String(s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
  }

  function buildIdMap() {
    idMap = {};
    ALL.forEach(t => {
      idMap[t.id] = t;
      idMap[(t.term || '').toLowerCase()] = t;
      (t.aka || []).forEach(a => { idMap[String(a).toLowerCase()] = t; });
    });
  }

  function resolveId(ref) {
    const raw = String(ref || '').trim();
    if (!raw) return '';
    if (idMap[raw]) return idMap[raw].id;
    const low = raw.toLowerCase();
    if (idMap[low]) return idMap[low].id;
    const slug = low.replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
    if (idMap[slug]) return idMap[slug].id;
    return slug || raw;
  }

  function labelForId(id) {
    const row = idMap[id];
    return row ? row.term : id;
  }

  function cardHTML(t) {
    const rel = (t.related || []).length
      ? '<div class="lexicon-see">see also: ' + t.related.map(r => {
          const rid = resolveId(r);
          return '<a href="#' + esc(rid) + '" data-id="' + esc(rid) + '">' + esc(labelForId(rid)) + '</a>';
        }).join(', ') + '</div>'
      : '';
    const org = t.origin
      ? '<div class="lexicon-origin"><b>origin</b> &nbsp;' + esc(t.origin) + '</div>'
      : '';
    const cat = t.cat || 'meme';
    const badge = '<span class="lexicon-cat">' + esc(CATGLYPH[cat] || '𓂀') + ' ' + esc(CHIPNAME[cat] || cat) + '</span>';
    let canon = '';
    if (codexIds.has(t.id) || memeIds.has(t.id)) {
      const links = [];
      if (codexIds.has(t.id)) links.push('<a href="/codex/#' + esc(t.id) + '">codex entry →</a>');
      if (memeIds.has(t.id)) links.push('<a href="/memes/#' + esc(t.id) + '">archive relic →</a>');
      canon = '<div class="lexicon-canonical">' + links.join(' · ') + '</div>';
    }
    return '<article class="lexicon-card" id="term-' + esc(t.id) + '">' +
      '<div class="lexicon-card-top">' + badge + '</div>' +
      '<div class="lexicon-term">' + esc(t.term) + '</div>' +
      '<div class="lexicon-def">' + esc(t.definition) + '</div>' +
      org + rel + canon +
      '</article>';
  }

  function scrollToTerm(id, highlight) {
    if (!id) return;
    const card = document.getElementById('term-' + id);
    if (!card) return;
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    if (highlight) {
      card.classList.add('lexicon-highlight');
      setTimeout(() => card.classList.remove('lexicon-highlight'), 2200);
    }
  }

  function applyHash() {
    const id = (location.hash || '').replace(/^#/, '').trim();
    if (!id) return;
    pendingHash = id;
    const row = idMap[id] || idMap[id.toLowerCase()];
    if (row) {
      activeCat = 'all';
      queryStr = '';
      searchEl.value = '';
      document.querySelectorAll('#lexicon-chips .cat-pill').forEach(c =>
        c.classList.toggle('active', c.dataset.cat === 'all')
      );
    }
    draw();
  }

  function draw() {
    const q = queryStr.trim().toLowerCase();
    const rows = ALL.filter(t => {
      if (activeCat !== 'all' && (t.cat || 'meme') !== activeCat) return false;
      if (!q) return true;
      const hay = (t.term + ' ' + t.definition + ' ' + (t.aka || []).join(' ') + ' ' + (t.origin || '')).toLowerCase();
      return hay.includes(q);
    });
    const countEl = document.getElementById('lexicon-count');
    if (countEl) countEl.textContent = rows.length + ' of ' + ALL.length + ' words';

    if (!rows.length) {
      content.innerHTML = '<div class="lexicon-state">no words match that search.</div>';
      return;
    }
    let html = '';
    const order = GROUPS.map(g => g[0]);
    const cats = [...new Set(rows.map(r => r.cat || 'meme'))].sort((a, b) => order.indexOf(a) - order.indexOf(b));
    cats.forEach(cat => {
      const items = rows.filter(r => (r.cat || 'meme') === cat);
      if (!items.length) return;
      html += '<h2 class="lexicon-group-title">' + (CATNAME[cat] || cat) + '</h2>' +
        '<div class="lexicon-grid">' + items.map(cardHTML).join('') + '</div>';
    });
    content.innerHTML = html;
    if (pendingHash) {
      const target = pendingHash;
      pendingHash = '';
      requestAnimationFrame(() => scrollToTerm(target, true));
    }
  }

  function buildChips() {
    const cats = ['all', ...GROUPS.map(g => g[0]).filter(c => ALL.some(t => (t.cat || 'meme') === c))];
    chipsEl.innerHTML = cats.map(c =>
      '<button type="button" class="cat-pill' + (c === 'all' ? ' active' : '') + '" data-cat="' + c + '">' +
      (c === 'all' ? 'All' : (CHIPNAME[c] || c)) + '</button>'
    ).join('');
    const statsEl = document.getElementById('lexicon-stats');
    if (statsEl) statsEl.textContent = ALL.length + ' words kept · five tongues · one faith';
  }

  document.addEventListener('click', e => {
    const chip = e.target.closest('.cat-pill');
    if (chip && chip.closest('#lexicon-chips')) {
      activeCat = chip.dataset.cat;
      document.querySelectorAll('#lexicon-chips .cat-pill').forEach(c => c.classList.toggle('active', c === chip));
      draw();
      return;
    }
    const rel = e.target.closest('[data-id]');
    if (rel && rel.closest('#lexicon-content')) {
      e.preventDefault();
      const id = rel.dataset.id;
      history.replaceState(null, '', '#' + id);
      activeCat = 'all';
      queryStr = '';
      searchEl.value = '';
      document.querySelectorAll('#lexicon-chips .cat-pill').forEach(c => c.classList.toggle('active', c.dataset.cat === 'all'));
      draw();
      requestAnimationFrame(() => scrollToTerm(id, true));
    }
  });

  searchEl.addEventListener('input', () => { queryStr = searchEl.value; pendingHash = ''; draw(); });
  window.addEventListener('hashchange', applyHash);

  async function load() {
    if (!C.SUPABASE_URL || !C.SUPABASE_ANON_KEY) {
      content.innerHTML = '<div class="lexicon-state">the vault did not answer.<br><br>config missing.</div>';
      return;
    }
    try {
      const headers = {
        apikey: C.SUPABASE_ANON_KEY,
        Authorization: 'Bearer ' + C.SUPABASE_ANON_KEY
      };
      const [lexRes, memeRes] = await Promise.all([
        fetch(C.SUPABASE_URL + '/rest/v1/lexicon?select=id,term,aka,cat,definition,origin,related&order=term.asc', { headers }),
        fetch(C.SUPABASE_URL + '/rest/v1/memes?select=id,scripture,lore', { headers })
      ]);
      if (!lexRes.ok) throw new Error('HTTP ' + lexRes.status);
      ALL = await lexRes.json();
      if (memeRes.ok) {
        const memes = await memeRes.json();
        memes.forEach(m => {
          memeIds.add(m.id);
          if ((m.scripture || '').trim() || (m.lore || '').trim()) codexIds.add(m.id);
        });
      }
      if (!ALL.length) {
        content.innerHTML = '<div class="lexicon-state">the lexicon is empty.</div>';
        return;
      }
      buildIdMap();
      const qParam = new URLSearchParams(location.search).get('q');
      if (qParam && !location.hash) {
        searchEl.value = qParam;
        queryStr = qParam;
      } else if (location.hash) {
        pendingHash = location.hash.replace(/^#/, '').trim();
      }
      buildChips();
      draw();
    } catch (err) {
      content.innerHTML = '<div class="lexicon-state">the vault did not answer.<br><br>' +
        '<span style="font-size:.85rem;opacity:.7">(' + esc(String(err)) + ')</span></div>';
    }
  }

  load();
})();
</script>
</body>
