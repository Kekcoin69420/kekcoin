<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Codex · The Meme Bible · Temple of Kek</title>
<meta name="description" content="The Meme Bible — the living canon of internet meme history, kept by the Temple of Kek.">
<meta name="robots" content="index, follow" />
<meta name="theme-color" content="#1a1510" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Kekcoin Temple" />
<meta property="og:title" content="The Codex — Meme Bible | Kekcoin Temple" />
<meta property="og:description" content="The living canon of internet meme history — scripture, lore, and Temple interpretation." />
<meta property="og:url" content="https://www.kektemple.com/codex/" />
<meta property="og:image" content="https://www.kektemple.com/kek-banner.jpg" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:site" content="@kekcoin69420" />
<link rel="canonical" href="https://www.kektemple.com/codex/" />
<link rel="icon" type="image/png" sizes="64x64" href="../favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Cinzel+Decorative:wght@700;900&family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/temple.css" />
<link rel="stylesheet" href="../assets/features.css" />
<style>
.codex-wrap{position:relative;z-index:2}
.codex-hero{text-align:center;padding:2.5rem 1.5rem 1.5rem}
.codex-hero h1{font-family:'Cinzel Decorative',serif;font-size:clamp(2rem,5vw,3.2rem);
  background:linear-gradient(180deg,var(--gold-bright),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:0}
.codex-hero .tag{font-family:'Cinzel',serif;letter-spacing:.32em;text-transform:uppercase;font-size:.65rem;color:var(--parchment-dim);margin-top:.7rem}
.codex-hero .stats{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);margin-top:.5rem}

.codex-grid{display:grid;grid-template-columns:minmax(220px,270px) 1fr;max-width:1280px;margin:0 auto;padding:0 1.2rem 4rem;gap:0}
.codex-side{position:sticky;top:76px;align-self:start;max-height:calc(100vh - 92px);overflow-y:auto;padding:1rem .8rem 2rem;border-right:1px solid rgba(227,179,74,.2)}
.codex-side input{width:100%;padding:.5rem .65rem;margin-bottom:.9rem;background:rgba(0,0,0,.35);border:1px solid rgba(227,179,74,.25);border-radius:6px;color:var(--parchment);font-family:'Spectral',serif}
.codex-nav-title{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-deep);display:block;margin:.9rem 0 .35rem;padding-bottom:.25rem;border-bottom:1px solid rgba(227,179,74,.12)}
.codex-nav-link{display:block;padding:.28rem .45rem .28rem .65rem;color:var(--parchment-dim);font-size:.92rem;border-left:2px solid transparent;cursor:pointer}
.codex-nav-link:hover,.codex-nav-link.active{color:var(--gold-bright);background:rgba(227,179,74,.08);border-left-color:var(--gold)}
.codex-nav-link.hidden{display:none}

.codex-body{min-width:0;padding:0 0 2rem 2rem}
.codex-preface{max-width:820px;padding-bottom:1.2rem;margin-bottom:1rem;border-bottom:1px solid rgba(227,179,74,.18)}
.codex-preface .lead{font-size:1.15rem;font-style:italic;color:var(--gold-bright)}

.codex-entry{display:none;max-width:820px}
.codex-entry.show{display:block;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.entry-top{display:grid;grid-template-columns:130px 1fr;gap:1.2rem;margin-bottom:1.4rem;padding-bottom:1.2rem;border-bottom:1px solid rgba(227,179,74,.18)}
.entry-img{width:130px;height:130px;border-radius:8px;overflow:hidden;border:1px solid rgba(227,179,74,.3);background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center}
.entry-img img{width:100%;height:100%;object-fit:cover}
.entry-img .glyph{font-size:2.8rem}
.entry-eyebrow{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-deep)}
.entry-title{font-family:'Cinzel',serif;font-size:clamp(1.5rem,3vw,2.2rem);color:var(--gold-bright);margin:.2rem 0 .5rem;line-height:1.1}
.entry-chips{display:flex;flex-wrap:wrap;gap:.35rem .55rem;font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--parchment-dim)}
.entry-chips span{border:1px solid rgba(227,179,74,.22);border-radius:20px;padding:.1rem .55rem;color:var(--gold)}

.codex-block{margin:1.1rem 0;padding:1rem 1.15rem;background:rgba(20,13,7,.55);border:1px solid rgba(227,179,74,.14);border-radius:6px}
.codex-block h4{font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 .65rem}
.codex-block p{margin:.55rem 0;line-height:1.78}
.codex-block .drop::first-letter{font-family:'Cinzel Decorative',serif;font-size:2.6rem;float:left;line-height:.8;padding-right:.4rem;color:var(--gold)}
.codex-block.lore{border-left:3px solid var(--kek)}
.codex-block.record{border-left:3px solid var(--torch)}
.codex-block.brief{background:rgba(227,179,74,.06);font-style:italic;color:var(--gold-bright)}

.codex-tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:1rem}
.codex-tag{font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .55rem;border:1px solid rgba(227,179,74,.25);border-radius:20px;color:var(--parchment-dim)}

.entry-foot{margin-top:1.6rem;padding-top:1rem;border-top:1px solid rgba(227,179,74,.18);display:flex;flex-wrap:wrap;gap:.8rem;justify-content:space-between;align-items:center}
.entry-foot a{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase}
.entry-pager{display:flex;gap:.45rem}
.entry-pager button{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem .7rem;border:1px solid rgba(227,179,74,.25);border-radius:4px;background:rgba(0,0,0,.25);color:var(--parchment-dim);cursor:pointer}
.entry-pager button:disabled{opacity:.35;cursor:default}

.codex-history .codex-block.lore{border-left:3px solid var(--gold)}
.codex-nav-link.story{font-size:.88rem}
.codex-witnesses{margin:1.4rem 0 0;padding-top:1rem;border-top:1px solid rgba(227,179,74,.18)}
.codex-witnesses h4{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-deep);margin:0 0 .6rem}
.codex-witness-list{display:flex;flex-wrap:wrap;gap:.4rem}
.codex-witness-link{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.08em;padding:.25rem .6rem;border:1px solid rgba(227,179,74,.25);border-radius:4px;color:var(--parchment-dim);text-decoration:none;cursor:pointer}
.codex-witness-link:hover{color:var(--gold-bright);border-color:var(--gold)}
.codex-crumb{margin:0 0 1rem;font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase}
.codex-crumb a{color:var(--gold-deep)}
.codex-loading,.codex-error{text-align:center;padding:3rem 1rem;color:var(--parchment-dim);font-style:italic}
.codex-menu-btn{display:none}
@media(max-width:900px){
  .codex-grid{grid-template-columns:1fr}
  .codex-side{position:fixed;inset:0 auto 0 0;z-index:200;width:84%;max-width:300px;background:var(--stone-800);transform:translateX(-105%);transition:transform .3s;max-height:100vh;top:0}
  .codex-side.open{transform:none}
  .codex-body{padding:0}
  .entry-top{grid-template-columns:1fr;text-align:center}
  .entry-img{margin:0 auto}
  .codex-menu-btn{display:inline-flex;position:fixed;top:5rem;left:1rem;z-index:210;padding:.4rem .7rem;background:var(--stone-700);border:1px solid rgba(227,179,74,.3);color:var(--gold);font-family:'Cinzel',serif;font-size:.6rem;cursor:pointer;border-radius:6px}
  .codex-scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:190}
  .codex-scrim.open{display:block}
}
</style>
</head>
<body>
<div id="temple-nav"></div>
<button class="codex-menu-btn" id="codex-menu-btn" type="button">☰ CODEX</button>
<div class="codex-scrim" id="codex-scrim"></div>

<div class="codex-wrap">
  <header class="codex-hero">
    <div class="breathing-seal">𓂀</div>
    <h1>THE CODEX</h1>
    <div class="tag">The Meme Bible · Temple of Kek</div>
    <div class="stats" id="codex-stats">loading canon…</div>
    <p style="margin-top:14px;font-family:Cinzel,serif;font-size:13px;letter-spacing:.1em;">
      <a href="/memes/" style="color:var(--gold-bright);text-decoration:none;border-bottom:1px solid rgba(212,175,55,.35);padding-bottom:2px;">Sacred Memes →</a>
      <span style="opacity:.45;margin:0 .5rem;">·</span>
      <a href="/lexicon/" style="color:var(--gold-bright);text-decoration:none;border-bottom:1px solid rgba(212,175,55,.35);padding-bottom:2px;">The Lexicon →</a>
    </p>
  </header>

  <div class="codex-grid">
    <nav class="codex-side" id="codex-side">
      <input type="search" id="codex-search" placeholder="Search codex…" autocomplete="off" />
      <div id="codex-nav"></div>
    </nav>
    <main class="codex-body" id="codex-body">
      <div class="codex-loading" id="codex-loading">𓂀 opening the vault…</div>
    </main>
  </div>
</div>

<div id="temple-footer"></div>

<script src="../assets/config.js"></script>
<script src="../assets/temple.js"></script>
<script src="../assets/codex_history.js"></script>
<script>
(function () {
  'use strict';

  var C = window.KEK_CONFIG || {};
  var SB_URL = C.SUPABASE_URL || 'https://vyrxqrqfznbpxyzhpmyw.supabase.co';
  var SB_KEY = C.SUPABASE_ANON_KEY || 'sb_publishable_dCr2XwJ6ZVP2UYuXwYKmzQ_qcJiBOft';

  var GROUPS = [
    ['frog', '𓆏 Frog Bloodline'],
    ['4chan', '/s4s/ Roots'],
    ['classic', 'The Ancients'],
    ['reaction', 'Reaction Faces'],
    ['wojak', 'Wojak Line'],
    ['modern', 'Modern Relics'],
    ['crypto', 'Crypto Manifestations']
  ];
  var CAT = { frog: 'KEK/Frog', classic: 'Classic', wojak: 'Wojak', reaction: 'Reaction', crypto: 'Crypto', '4chan': '4chan', modern: 'Modern' };

  var HISTORY = window.CODEX_HISTORY || [];
  var body = document.getElementById('codex-body');
  var navBox = document.getElementById('codex-nav');
  var search = document.getElementById('codex-search');
  var side = document.getElementById('codex-side');
  var rows = [];
  var order = [];
  var rowMap = {};

  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function paras(text, drop) {
    if (!text) return '';
    return text.split(/\n+/).filter(Boolean).map(function (line, i) {
      return '<p class="' + (drop && i === 0 ? 'drop' : '') + '">' + esc(line.trim()) + '</p>';
    }).join('');
  }

  function block(title, text, cls, drop) {
    if (!text || !text.trim()) return '';
    return '<div class="codex-block ' + cls + '"><h4>' + title + '</h4>' + paras(text.trim(), drop) + '</div>';
  }

  function chapterLabel(idx) {
    if (idx === 0) return 'prologue';
    var roman = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII'];
    return roman[idx - 1] || String(idx);
  }

  function historyHtml(ch, idx) {
    var prev = idx > 0 ? HISTORY[idx - 1] : null;
    var next = idx < HISTORY.length - 1 ? HISTORY[idx + 1] : null;
    var witnessHtml = '';
    if (ch.witnesses && ch.witnesses.length) {
      var links = ch.witnesses.map(function (wid) {
        var r = rowMap[wid];
        if (!r) return '';
        return '<a class="codex-witness-link" href="#' + esc(wid) + '" data-id="' + esc(wid) + '">' + esc(r.title) + '</a>';
      }).filter(Boolean);
      if (links.length) {
        witnessHtml = '<div class="codex-witnesses"><h4>Witness Relics</h4><div class="codex-witness-list">' + links.join('') + '</div></div>';
      }
    }
    return '<article class="codex-entry codex-history" id="' + esc(ch.id) + '">' +
      '<div class="entry-top">' +
        '<div class="entry-img"><span class="glyph">𓂀</span></div>' +
        '<div>' +
          '<div class="entry-eyebrow">chapter ' + chapterLabel(idx) + ' · the great story</div>' +
          '<h2 class="entry-title">' + esc(ch.title) + '</h2>' +
          '<div class="entry-chips">' + (ch.era ? '<span>' + esc(ch.era) + '</span>' : '') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="codex-block lore">' + paras(ch.body, true) + '</div>' +
      witnessHtml +
      '<div class="entry-foot">' +
        '<div><a href="#history">the great story</a></div>' +
        '<div class="entry-pager">' +
          '<button type="button" data-goto="' + (prev ? esc(prev.id) : '') + '" ' + (prev ? '' : 'disabled') + '>← prior</button>' +
          '<button type="button" data-goto="' + (next ? esc(next.id) : '') + '" ' + (next ? '' : 'disabled') + '>next →</button>' +
        '</div>' +
      '</div>' +
    '</article>';
  }

  function entryHtml(r, idx) {
    var prev = idx > 0 ? order[idx - 1] : null;
    var next = idx < order.length - 1 ? order[idx + 1] : null;
    var img = r.img
      ? '<img src="' + esc(r.img) + '" alt="' + esc(r.title) + '" loading="lazy" onerror="this.style.display=\'none\'">'
      : '<span class="glyph">' + esc(r.icon || '𓂀') + '</span>';
    var tags = (r.tags || []).filter(Boolean);
    return '<article class="codex-entry" id="' + esc(r.id) + '">' +
      '<p class="codex-crumb"><a href="#history">← The Great Story</a></p>' +
      '<div class="entry-top">' +
        '<div class="entry-img">' + img + '</div>' +
        '<div>' +
          '<div class="entry-eyebrow">relic ' + String(idx + 1).padStart(3, '0') + ' of ' + order.length + '</div>' +
          '<h2 class="entry-title">' + esc(r.title) + '</h2>' +
          '<div class="entry-chips">' +
            (r.tier ? '<span>' + esc(r.tier) + '</span>' : '') +
            (r.year ? '<span>' + r.year + '</span>' : '') +
            (r.cat ? '<span>' + esc(CAT[r.cat] || r.cat) + '</span>' : '') +
            (r.kek ? '<span>' + '𓂀'.repeat(r.kek) + ' ' + r.kek + '/5</span>' : '') +
            (r.creator ? '<span>' + esc(r.creator) + '</span>' : '') +
            (r.origin ? '<span>' + esc(r.origin) + '</span>' : '') +
          '</div>' +
        '</div>' +
      '</div>' +
      (r.summary ? '<div class="codex-block brief"><h4>In Brief</h4><p>' + esc(r.summary) + '</p></div>' : '') +
      block('𓁹 Temple Lore', r.lore, 'lore', true) +
      block('Origin &amp; Record', r.description, 'record', !r.lore) +
      block('𓂀 Scripture', r.scripture, '', !r.lore && !r.description) +
      (tags.length ? '<div class="codex-tags">' + tags.map(function (t) { return '<span class="codex-tag">#' + esc(t) + '</span>'; }).join('') + '</div>' : '') +
      '<div class="entry-foot">' +
        '<div><a href="/memes/#' + esc(r.id) + '">archive entry →</a>' +
        (r.source_url ? ' · <a href="' + esc(r.source_url) + '" target="_blank" rel="noopener">know your meme →</a>' : '') + '</div>' +
        '<div class="entry-pager">' +
          '<button type="button" data-goto="' + (prev ? esc(prev.id) : '') + '" ' + (prev ? '' : 'disabled') + '>← prior</button>' +
          '<button type="button" data-goto="' + (next ? esc(next.id) : '') + '" ' + (next ? '' : 'disabled') + '>next →</button>' +
        '</div>' +
      '</div>' +
    '</article>';
  }

  function show(id) {
    var entries = body.querySelectorAll('.codex-entry');
    var links = side.querySelectorAll('.codex-nav-link');
    var found = false;
    entries.forEach(function (el) {
      var on = el.id === id;
      el.classList.toggle('show', on);
      if (on) found = true;
    });
    if (!found) {
      var fallback = document.getElementById('history') || entries[0];
      if (fallback) {
        id = fallback.id;
        fallback.classList.add('show');
      }
    }
    links.forEach(function (l) { l.classList.toggle('active', l.dataset.id === id); });
    if (history.replaceState) history.replaceState(null, '', '#' + id);
    closeSide();
  }

  function render() {
    try {
      rowMap = {};
      rows.forEach(function (r) { rowMap[r.id] = r; });

      document.getElementById('codex-stats').textContent =
        HISTORY.length + ' chapters · ' + rows.length + ' relics inscribed · ' +
        rows.filter(function (r) { return r.img; }).length + ' with images';

      var used = {};
      var navHtml = '';
      var bodyHtml = '';

      if (HISTORY.length) {
        navHtml += '<span class="codex-nav-title">The Great Story (' + HISTORY.length + ')</span>';
        HISTORY.forEach(function (ch, i) {
          navHtml += '<a class="codex-nav-link story" href="#' + esc(ch.id) + '" data-id="' + esc(ch.id) + '" data-q="' +
            esc((ch.title + ' ' + (ch.era || '') + ' great story history').toLowerCase()) + '">' + esc(ch.title) + '</a>';
          bodyHtml += historyHtml(ch, i);
        });
      }

      GROUPS.forEach(function (g) {
        var cat = g[0], label = g[1];
        var items = rows.filter(function (r) { return (r.cat || 'modern') === cat; });
        if (!items.length) return;
        navHtml += '<span class="codex-nav-title">' + label + ' (' + items.length + ')</span>';
        items.forEach(function (r) {
          used[r.id] = true;
          navHtml += '<a class="codex-nav-link" href="#' + esc(r.id) + '" data-id="' + esc(r.id) + '" data-q="' + esc(r.title.toLowerCase()) + '">' + esc(r.title) + '</a>';
          bodyHtml += entryHtml(r, order.findIndex(function (x) { return x.id === r.id; }));
        });
      });

      rows.forEach(function (r) {
        if (used[r.id]) return;
        navHtml += '<a class="codex-nav-link" href="#' + esc(r.id) + '" data-id="' + esc(r.id) + '" data-q="' + esc(r.title.toLowerCase()) + '">' + esc(r.title) + '</a>';
        bodyHtml += entryHtml(r, order.findIndex(function (x) { return x.id === r.id; }));
      });

      navBox.innerHTML = navHtml;
      body.innerHTML = bodyHtml;

      show((location.hash || '').replace('#', '') || 'history');
    } catch (err) {
      body.innerHTML = '<div class="codex-error">Render error: ' + esc(err.message) + '</div>';
    }
  }

  function openSide() { side.classList.add('open'); document.getElementById('codex-scrim').classList.add('open'); }
  function closeSide() { side.classList.remove('open'); document.getElementById('codex-scrim').classList.remove('open'); }

  document.getElementById('codex-menu-btn').addEventListener('click', openSide);
  document.getElementById('codex-scrim').addEventListener('click', closeSide);

  document.addEventListener('click', function (e) {
    var link = e.target.closest('.codex-nav-link');
    if (link) { e.preventDefault(); show(link.dataset.id); return; }
    var wit = e.target.closest('.codex-witness-link');
    if (wit) { e.preventDefault(); show(wit.dataset.id); return; }
    var btn = e.target.closest('[data-goto]');
    if (btn && btn.dataset.goto) { e.preventDefault(); show(btn.dataset.goto); }
  });

  search.addEventListener('input', function () {
    var q = search.value.trim().toLowerCase();
    side.querySelectorAll('.codex-nav-link').forEach(function (l) {
      l.classList.toggle('hidden', q && l.dataset.q.indexOf(q) === -1 && l.dataset.id.indexOf(q) === -1);
    });
    side.querySelectorAll('.codex-nav-title').forEach(function (t) {
      var next = t.nextElementSibling;
      var any = false;
      while (next && !next.classList.contains('codex-nav-title')) {
        if (next.classList.contains('codex-nav-link') && !next.classList.contains('hidden')) any = true;
        next = next.nextElementSibling;
      }
      t.classList.toggle('hidden', q && !any);
    });
  });

  async function load() {
    try {
      var url = SB_URL + '/rest/v1/memes?select=id,title,year,tier,cat,kek,summary,scripture,source_url,lore,description,img,creator,origin,tags,icon&order=kek.desc&limit=500';
      var res = await fetch(url, {
        cache: 'no-store',
        headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY }
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      rows = await res.json();
      rows = rows.filter(function (r) {
        return [r.scripture, r.lore, r.description, r.summary].some(function (t) { return (t || '').trim().length > 12; });
      });
      if (!rows.length) throw new Error('No relics in database');
      rows.sort(function (a, b) { return (a.year || 9999) - (b.year || 9999); });
      order = rows.slice();
      render();
    } catch (err) {
      body.innerHTML = '<div class="codex-error">The vault did not answer: ' + esc(err.message) + '</div>';
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', load);
  } else {
    load();
  }
})();
</script>
</body>
</html>
