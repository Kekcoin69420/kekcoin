<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Codex · The Meme Bible · Temple of Kek</title>
<meta name="description" content="The Meme Bible — the living canon of internet meme history, kept by the Temple of Kek.">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta name="robots" content="index, follow" />
<meta name="theme-color" content="#1a1510" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Kekcoin Temple" />
<meta property="og:title" content="The Codex — Meme Bible | Kekcoin Temple" />
<meta property="og:description" content="The living canon of internet meme history — scripture, lore, and Temple interpretation." />
<meta property="og:url" content="https://www.kektemple.com/codex/" />
<meta property="og:image" content="https://www.kektemple.com/kek-banner.jpg" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:site" content="@kekcoin69420" />
<link rel="canonical" href="https://www.kektemple.com/codex/" />
<link rel="icon" type="image/png" sizes="64x64" href="../favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Cinzel+Decorative:wght@700;900&family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/temple.css" />
<link rel="stylesheet" href="../assets/features.css" />
<style>
/* Codex manuscript layout — v2 */
.codex-page{position:relative;z-index:2}
.codex-hero{text-align:center;padding:3rem 1.5rem 2rem}
.codex-hero .seal{font-size:2.4rem;margin-bottom:1rem}
.codex-hero h1{font-family:'Cinzel Decorative',serif;font-size:clamp(2rem,5vw,3.2rem);
  background:linear-gradient(180deg,var(--gold-bright),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:0}
.codex-hero .tag{font-family:'Cinzel',serif;letter-spacing:.35em;text-transform:uppercase;font-size:.65rem;color:var(--parchment-dim);margin-top:.8rem}
.codex-hero .stats{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);margin-top:.6rem}

.codex-shell{display:grid;grid-template-columns:minmax(240px,280px) 1fr;max-width:1320px;margin:0 auto;padding:0 1.2rem 4rem;gap:0}
.codex-sidebar{position:sticky;top:72px;align-self:start;max-height:calc(100vh - 88px);overflow-y:auto;
  padding:1rem .9rem 2rem;border-right:1px solid rgba(227,179,74,.22)}
.codex-sidebar input{width:100%;padding:.55rem .7rem;margin-bottom:1rem;background:rgba(0,0,0,.35);
  border:1px solid rgba(227,179,74,.25);border-radius:6px;color:var(--parchment);font-family:'Spectral',serif}
.codex-navgroup{margin-bottom:1rem}
.codex-navtitle{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold-deep);display:block;margin-bottom:.4rem;padding-bottom:.25rem;border-bottom:1px solid rgba(227,179,74,.12)}
.codex-navlink{display:block;padding:.3rem .5rem .3rem .7rem;color:var(--parchment-dim);font-size:.92rem;
  border-left:2px solid transparent;cursor:pointer;border-radius:0 4px 4px 0}
.codex-navlink:hover,.codex-navlink.active{color:var(--gold-bright);background:rgba(227,179,74,.08);border-left-color:var(--gold)}
.codex-navlink.hidden{display:none}

.codex-main{min-width:0;padding:0 0 3rem 2rem}
.codex-preface{max-width:860px;padding-bottom:1.5rem;margin-bottom:1rem;border-bottom:1px solid rgba(227,179,74,.2)}
.codex-preface .lead{font-size:1.2rem;font-style:italic;color:var(--gold-bright)}

.codex-relic{display:none;max-width:860px;animation:codexIn .4s ease}
.codex-relic.show{display:block}
@keyframes codexIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* Full-width relic banner */
.relic-banner{position:relative;height:min(42vw,320px);min-height:200px;border-radius:10px;overflow:hidden;
  margin-bottom:1.6rem;border:1px solid rgba(227,179,74,.3);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.relic-banner img{width:100%;height:100%;object-fit:cover;display:block}
.relic-banner.no-img{background:linear-gradient(135deg,#2a1a08,#0c0805 60%);display:flex;align-items:center;justify-content:center}
.relic-banner .banner-glyph{font-size:5rem;opacity:.5;filter:drop-shadow(0 0 24px rgba(227,179,74,.4))}
.relic-banner-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(12,8,5,.92) 0%,rgba(12,8,5,.2) 55%,transparent 100%)}
.relic-banner-caption{position:absolute;left:0;right:0;bottom:0;padding:1.4rem 1.6rem}
.relic-banner-caption .eyebrow{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-deep)}
.relic-banner-caption h2{font-family:'Cinzel',serif;font-size:clamp(1.5rem,4vw,2.4rem);color:var(--gold-bright);margin:.2rem 0 0;line-height:1.1}

.relic-epigraph{margin:0 0 1.6rem;padding:1.1rem 1.4rem;border-left:4px solid var(--gold);
  background:rgba(227,179,74,.07);font-size:1.28rem;font-style:italic;color:var(--gold-bright);line-height:1.55}

.relic-manifest{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.6rem;margin-bottom:1.6rem}
.manifest-cell{padding:.65rem .8rem;background:rgba(0,0,0,.3);border:1px solid rgba(227,179,74,.15);border-radius:6px}
.manifest-cell .lbl{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.2rem}
.manifest-cell .val{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--parchment)}
.manifest-cell .val.gold{color:var(--gold-bright)}
.kek-meter{display:flex;gap:3px;margin-top:.15rem}
.kek-meter span{font-size:.85rem;color:var(--gold-bright)}

.codex-section{margin:1.35rem 0;padding:1.25rem 1.35rem;background:linear-gradient(160deg,rgba(30,20,8,.75),rgba(12,8,5,.9));
  border:1px solid rgba(227,179,74,.16);border-radius:8px}
.codex-section h3{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold);margin:0 0 .85rem;padding-bottom:.5rem;border-bottom:1px solid rgba(227,179,74,.12)}
.codex-section p{margin:.7rem 0;line-height:1.82;color:var(--parchment)}
.codex-section .firstcap::first-letter{font-family:'Cinzel Decorative',serif;font-size:3rem;float:left;line-height:.78;
  padding:.05rem .45rem 0 0;color:var(--gold)}
.codex-section.lore{border-left:4px solid var(--kek)}
.codex-section.record{border-left:4px solid var(--torch)}
.codex-section.scripture{border-left:4px solid var(--gold-bright)}

.codex-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin:1.2rem 0}
.codex-tag{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.22rem .6rem;border:1px solid rgba(227,179,74,.25);border-radius:20px;color:var(--parchment-dim)}

.codex-related{margin:1.8rem 0;padding-top:1.2rem;border-top:1px solid rgba(227,179,74,.18)}
.codex-related h4{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-deep);margin:0 0 .8rem}
.related-row{display:flex;flex-wrap:wrap;gap:.5rem}
.related-chip{font-family:'Cinzel',serif;font-size:.62rem;padding:.4rem .75rem;border:1px solid rgba(227,179,74,.22);
  border-radius:20px;color:var(--parchment-dim);cursor:pointer;background:rgba(0,0,0,.2)}
.related-chip:hover{border-color:var(--gold);color:var(--gold-bright)}

.codex-foot{margin-top:2rem;padding-top:1.2rem;border-top:1px solid rgba(227,179,74,.2);
  display:flex;flex-wrap:wrap;gap:1rem;justify-content:space-between;align-items:center}
.codex-foot a{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase}
.codex-pager{display:flex;gap:.5rem}
.codex-pager button{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.45rem .8rem;border:1px solid rgba(227,179,74,.25);border-radius:4px;background:rgba(0,0,0,.25);
  color:var(--parchment-dim);cursor:pointer}
.codex-pager button:hover:not(:disabled){border-color:var(--gold);color:var(--gold-bright)}
.codex-pager button:disabled{opacity:.3;cursor:default}

.codex-state{text-align:center;padding:4rem;color:var(--parchment-dim);font-style:italic}
.codex-menubtn{display:none}
@media(max-width:920px){
  .codex-shell{grid-template-columns:1fr}
  .codex-sidebar{position:fixed;inset:0 auto 0 0;z-index:200;width:85%;max-width:300px;background:var(--stone-800);
    transform:translateX(-105%);transition:transform .3s;max-height:100vh;top:0}
  .codex-sidebar.open{transform:none}
  .codex-main{padding:0}
  .codex-menubtn{display:inline-flex;position:fixed;top:5rem;left:1rem;z-index:210;padding:.45rem .75rem;
    background:var(--stone-700);border:1px solid rgba(227,179,74,.3);color:var(--gold);font-family:'Cinzel',serif;
    font-size:.62rem;letter-spacing:.14em;cursor:pointer;border-radius:6px}
  .codex-scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:190}
  .codex-scrim.open{display:block}
}
</style>
</head>
<body>
<div id="temple-nav"></div>
<button class="codex-menubtn" id="codex-menubtn">☰ RELICS</button>
<div class="codex-scrim" id="codex-scrim"></div>

<div class="codex-page">
  <header class="codex-hero">
    <div class="breathing-seal seal">𓂀</div>
    <h1>THE CODEX</h1>
    <div class="tag">The Meme Bible · Temple of Kek</div>
    <p class="stats" id="codex-stats"></p>
  </header>

  <div class="codex-shell">
    <nav class="codex-sidebar" id="codex-sidebar">
      <input type="search" id="codex-search" placeholder="Search relics…" autocomplete="off" />
    </nav>
    <main class="codex-main" id="codex-main">
      <div class="codex-state" id="codex-state"><span class="breathing-seal">𓂀</span><div style="margin-top:1rem">opening the vault…</div></div>
    </main>
  </div>
</div>

<div id="temple-footer"></div>

<script src="../assets/config.js"></script>
<script src="../assets/temple.js"></script>
<script>
(function(){
  const C = window.KEK_CONFIG || {};
  const SB = C.SUPABASE_URL;
  const KEY = C.SUPABASE_ANON_KEY;

  const GROUPS = [
    ['frog','𓆏 Frog Bloodline'],['4chan','/s4s/ Roots'],['classic','The Ancients'],
    ['reaction','Reaction Faces'],['wojak','Wojak Line'],['modern','Modern Relics'],['crypto','Crypto Manifestations']
  ];
  const CAT = {frog:'KEK/Frog',classic:'Classic',wojak:'Wojak',reaction:'Reaction',crypto:'Crypto','4chan':'4chan',modern:'Modern'};

  const main = document.getElementById('codex-main');
  const sidebar = document.getElementById('codex-sidebar');
  const search = document.getElementById('codex-search');
  let rows = [], order = [];

  function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]});}

  function splitReadable(text){
    if(!text) return [];
    if(text.includes('\n')) return text.split(/\n+/).filter(Boolean);
    return text.replace(/([.!?])\s+(?=[A-Z])/g,'$1\n').split(/\n+/).filter(t=>t.trim().length>8);
  }

  function paras(text, cap){
    const parts = splitReadable(text);
    return parts.map((p,i)=>`<p class="${cap&&i===0?'firstcap':''}">${esc(p.trim())}</p>`).join('');
  }

  function banner(r){
    if(r.img){
      return `<div class="relic-banner">
        <img src="${esc(r.img)}" alt="${esc(r.title)}" loading="lazy" onerror="this.closest('.relic-banner').classList.add('no-img');this.remove()">
        <div class="relic-banner-overlay"></div>
        <div class="relic-banner-caption">
          <div class="eyebrow">relic ${String(order.findIndex(x=>x.id===r.id)+1).padStart(3,'0')} of ${order.length} · ${esc(CAT[r.cat]||r.cat||'')}</div>
          <h2>${esc(r.title)}</h2>
        </div></div>`;
    }
    return `<div class="relic-banner no-img">
      <span class="banner-glyph">${esc(r.icon||'𓂀')}</span>
      <div class="relic-banner-overlay"></div>
      <div class="relic-banner-caption">
        <div class="eyebrow">relic ${String(order.findIndex(x=>x.id===r.id)+1).padStart(3,'0')} of ${order.length}</div>
        <h2>${esc(r.title)}</h2>
      </div></div>`;
  }

  function manifest(r){
    const cells = [];
    if(r.tier) cells.push(['Tier',`<span class="val gold">${esc(r.tier)}</span>`]);
    if(r.year) cells.push(['Year',`<span class="val">${r.year}</span>`]);
    if(r.creator) cells.push(['Creator',`<span class="val">${esc(r.creator)}</span>`]);
    if(r.origin) cells.push(['Origin',`<span class="val">${esc(r.origin)}</span>`]);
    if(r.kek) cells.push(['KEK Bond',`<span class="val"><div class="kek-meter">${Array.from({length:5}).map((_,i)=>`<span>${i<r.kek?'𓂀':'○'}</span>`).join('')}</div></span>`]);
    if(r.cat) cells.push(['Chamber',`<span class="val">${esc(CAT[r.cat]||r.cat)}</span>`]);
    return `<div class="relic-manifest">${cells.map(([l,v])=>`<div class="manifest-cell"><span class="lbl">${l}</span>${v}</div>`).join('')}</div>`;
  }

  function section(title, text, cls, cap){
    if(!text || !text.trim()) return '';
    return `<div class="codex-section ${cls}"><h3>${title}</h3>${paras(text.trim(), cap)}</div>`;
  }

  function related(r){
    const rel = rows.filter(x=>x.cat===r.cat && x.id!==r.id).slice(0,6);
    if(!rel.length) return '';
    return `<div class="codex-related"><h4>Related in ${esc(CAT[r.cat]||'this chamber')}</h4>
      <div class="related-row">${rel.map(x=>`<span class="related-chip" data-goto="${x.id}">${esc(x.title)}</span>`).join('')}</div></div>`;
  }

  function relicHTML(r){
    const idx = order.findIndex(x=>x.id===r.id);
    const prev = idx>0?order[idx-1]:null, next = idx<order.length-1?order[idx+1]:null;
    const lore = (r.lore||'').trim();
    const desc = (r.description||'').trim();
    const scr = (r.scripture||'').trim();
    const summary = (r.summary||'').trim();
    const tags = (r.tags||[]).filter(Boolean);

    return `<article class="codex-relic" id="${r.id}">
      ${banner(r)}
      ${summary?`<blockquote class="relic-epigraph">&ldquo;${esc(summary)}&rdquo;</blockquote>`:''}
      ${manifest(r)}
      ${lore?section('𓁹 Temple Lore',lore,'lore',true):''}
      ${desc?section('Origin &amp; Historical Record',desc,'record',!lore):''}
      ${scr?section('𓂀 Full Scripture',scr,'scripture',!lore&&!desc):''}
      ${tags.length?`<div class="codex-tags">${tags.map(t=>`<span class="codex-tag">#${esc(t)}</span>`).join('')}</div>`:''}
      ${related(r)}
      <div class="codex-foot">
        <div>
          <a href="/memes/#${r.id}">archive entry →</a>
          ${r.source_url?` &nbsp;·&nbsp; <a href="${esc(r.source_url)}" target="_blank" rel="noopener">know your meme →</a>`:''}
        </div>
        <div class="codex-pager">
          <button data-goto="${prev?prev.id:''}" ${prev?'':'disabled'}>← ${prev?esc(prev.title).slice(0,18):'start'}</button>
          <button data-goto="${next?next.id:''}" ${next?'':'disabled'}>${next?esc(next.title).slice(0,18):'end'} →</button>
        </div>
      </div>
    </article>`;
  }

  function preface(){
    return `<div class="codex-preface" id="codex-preface">
      <p class="lead">The Codex is the Meme Bible — every relic inscribed with Temple lore, historical record, scripture, and the KEK bond.</p>
      <p style="color:var(--parchment-dim);margin-top:.8rem">Each entry below carries an epigraph, witness image, manifest of origin, temple interpretation, and the full canon text. Select a relic from the sidebar or search by name.</p>
    </div>`;
  }

  function render(){
    document.getElementById('codex-stats').textContent =
      `${rows.length} relics · ${rows.filter(r=>r.img).length} with witness images · ${GROUPS.length} chambers`;

    const used = new Set();
    let html = preface(), nav = '';
    GROUPS.forEach(([cat,label])=>{
      const items = rows.filter(r=>(r.cat||'modern')===cat);
      if(!items.length) return;
      items.forEach(r=>used.add(r.id));
      nav += `<div class="codex-navgroup" data-cat="${cat}"><span class="codex-navtitle">${label} (${items.length})</span>` +
        items.map(r=>`<a class="codex-navlink" data-target="${r.id}" data-q="${esc(r.title.toLowerCase())}">${esc(r.title)}</a>`).join('') + `</div>`;
      html += items.map(relicHTML).join('');
    });
    const rest = rows.filter(r=>!used.has(r.id));
    if(rest.length){
      nav += `<div class="codex-navgroup"><span class="codex-navtitle">More (${rest.length})</span>` +
        rest.map(r=>`<a class="codex-navlink" data-target="${r.id}" data-q="${esc(r.title.toLowerCase())}">${esc(r.title)}</a>`).join('') + `</div>`;
      html += rest.map(relicHTML).join('');
    }

    const s = search;
    sidebar.innerHTML = '';
    sidebar.appendChild(s);
    sidebar.insertAdjacentHTML('beforeend', nav);
    main.innerHTML = html;

    const relics = [...main.querySelectorAll('.codex-relic')];
    const links = [...sidebar.querySelectorAll('.codex-navlink')];

    function show(id){
      let ok = false;
      relics.forEach(el=>{const on=el.id===id;el.classList.toggle('show',on);if(on)ok=true;});
      if(!ok&&relics[0]){id=relics[0].id;relics[0].classList.add('show');}
      links.forEach(l=>l.classList.toggle('active',l.dataset.target===id));
      const pre=document.getElementById('codex-preface');
      if(pre) pre.style.display = id ? 'none' : 'block';
      history.replaceState(null,'','#'+id);
      main.scrollIntoView({behavior:'smooth',block:'start'});
      closeSb();
    }

    main.addEventListener('click',e=>{
      const t=e.target.closest('[data-target]');
      if(t){e.preventDefault();show(t.dataset.target);return;}
      const g=e.target.closest('[data-goto]');
      if(g&&g.dataset.goto) show(g.dataset.goto);
    });
    sidebar.addEventListener('click',e=>{
      const t=e.target.closest('[data-target]');
      if(t){e.preventDefault();show(t.dataset.target);}
    });

    search.addEventListener('input',()=>{
      const q=search.value.trim().toLowerCase();
      links.forEach(l=>l.classList.toggle('hidden',q&&!l.dataset.q.includes(q)&&!l.dataset.target.includes(q)));
      sidebar.querySelectorAll('.codex-navgroup').forEach(g=>{
        g.style.display=g.querySelectorAll('.codex-navlink:not(.hidden)').length?'':'none';
      });
    });

    show((location.hash||'').replace('#','')||relics[0]?.id);
  }

  function openSb(){sidebar.classList.add('open');document.getElementById('codex-scrim').classList.add('open');}
  function closeSb(){sidebar.classList.remove('open');document.getElementById('codex-scrim').classList.remove('open');}
  document.getElementById('codex-menubtn').addEventListener('click',openSb);
  document.getElementById('codex-scrim').addEventListener('click',closeSb);

  async function load(){
    if(!KEY){main.innerHTML='<div class="codex-state">config.js missing Supabase key</div>';return;}
    try{
      const res=await fetch(`${SB}/rest/v1/memes?select=*&order=kek.desc&limit=500`,{headers:{apikey:KEY,Authorization:'Bearer '+KEY}});
      if(!res.ok) throw new Error('HTTP '+res.status);
      rows=(await res.json()).filter(r=>[r.scripture,r.lore,r.description,r.summary].some(t=>(t||'').trim().length>15));
      if(!rows.length){main.innerHTML='<div class="codex-state">Codex empty — run tools/backfill_codex.js</div>';return;}
      rows.sort((a,b)=>(a.year||9999)-(b.year||9999));
      order=rows.slice();
      render();
    }catch(e){main.innerHTML=`<div class="codex-state">Vault error: ${esc(e.message)}</div>`;}
  }
  load();
})();
</script>
</body>
</html>
